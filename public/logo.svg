<svg xmlns="http://www.w3.org/2000/svg" width="260" height="60" viewBox="0 0 260 60" fill="none">
  <!-- Calendario: cuerpo -->
  <rect x="2" y="14" width="46" height="42" rx="6" fill="#3A3A3A" stroke="#555555" stroke-width="1.5"/>
  <!-- Clips superiores -->
  <rect x="12" y="7" width="7" height="14" rx="3.5" fill="#555555"/>
  <rect x="29" y="7" width="7" height="14" rx="3.5" fill="#555555"/>
  <!-- Franja superior del calendario -->
  <rect x="2" y="14" width="46" height="14" rx="6" fill="#4A4A4A"/>
  <rect x="2" y="23" width="46" height="5" fill="#4A4A4A"/>
  <!-- Checkmark naranja grande -->
  <polyline points="11,38 21,48 39,26" stroke="#F97316" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texto: "Ag" blanco -->
  <text x="60" y="44" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Ag</text>
  <!-- "e" blanco -->
  <text x="101" y="44" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">e</text>
  <!-- Tilde naranja sobre la "e" — centrado en x≈110, corto y grueso -->
  <line x1="107" y1="20" x2="113" y2="13" stroke="#F97316" stroke-width="4.5" stroke-linecap="round"/>
  <!-- "ndalo" blanco -->
  <text x="119" y="44" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">ndalo</text>
</svg>
