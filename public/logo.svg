<svg xmlns="http://www.w3.org/2000/svg" width="220" height="52" viewBox="0 0 220 52" fill="none">
  <!-- Calendario: cuerpo -->
  <rect x="2" y="12" width="40" height="36" rx="5" fill="#3A3A3A" stroke="#555555" stroke-width="1.5"/>
  <!-- Clips superiores -->
  <rect x="11" y="6" width="6" height="12" rx="3" fill="#555555"/>
  <rect x="25" y="6" width="6" height="12" rx="3" fill="#555555"/>
  <!-- Franja superior del calendario -->
  <rect x="2" y="12" width="40" height="12" rx="5" fill="#4A4A4A"/>
  <rect x="2" y="20" width="40" height="4" fill="#4A4A4A"/>
  <!-- Checkmark naranja grande -->
  <polyline points="10,33 18,41 33,22" stroke="#F97316" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texto: "Ag" blanco -->
  <text x="52" y="38" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">Ag</text>
  <!-- "e" blanco -->
  <text x="88" y="38" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">e</text>
  <!-- Tilde naranja sobre la "e" -->
  <path d="M 92 19 Q 96.5 11 101 15" stroke="#F97316" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- "ndalo" blanco -->
  <text x="104" y="38" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">ndalo</text>
</svg>
